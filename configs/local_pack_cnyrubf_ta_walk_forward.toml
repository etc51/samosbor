[app]
name = "samosbor"
timezone = "Europe/Moscow"

[tbank]
token_env = "TBANK_INVEST_TOKEN"
sandbox_token_env = "TBANK_SANDBOX_TOKEN"
account_id_env = "TBANK_ACCOUNT_ID"
account_name = "Фьючерсы"
app_name = "samosbor"
ssl_verify_env = "SSL_TBANK_VERIFY"

[data]
source = "moex-data-pack"
timeframe = "hour"
history_days = 365
local_data_pack_path = "D:/3_pips_x2_project/moex_futures_data_pack"

[[data.instruments]]
symbol = "CNYRUBF"
instrument_type = "future"

[strategy]
style = "ema_adx_macd"
fast_window = 10
slow_window = 40
atr_window = 14
volume_window = 20
breakout_window = 20
require_breakout = false
atr_stop_multiple = 1.5
reward_to_risk = 2.0
min_trend_strength = 0.002
min_liquidity_rub = 1000000
allow_shorts = true
adx_window = 14
adx_min = 20.0
rsi_window = 14
rsi_long_min = 50.0
rsi_long_max = 75.0
rsi_short_min = 25.0
rsi_short_max = 50.0
macd_fast = 12
macd_slow = 26
macd_signal = 9

[risk]
max_risk_per_trade = 0.01
# Conservative walk-forward profile with margin still available through exposure cap.
max_gross_exposure = 1.5
max_drawdown = 0.12
cash_reserve_ratio = 0.10
max_positions = 2
kelly_lookback_trades = 20
min_trades_for_kelly = 8

[execution]
mode = "local-paper"
slippage_bps = 2.0
# Premium futures paper approximation.
commission_bps = 2.0
state_path = "state/local_pack_cnyrubf_ta_walk_forward_state.json"
allow_live_trading = false

[backtest]
initial_cash = 1000000
warmup_bars = 60

[reporting]
output_dir = "runs"
write_csv = true

[research]
strategy_styles = ["ema_adx_macd"]
fast_windows = [10]
slow_windows = [40]
require_breakout_values = [false, true]
atr_stop_multipliers = [1.5]
reward_to_risk_values = [2.0]
trend_strength_values = [0.002]
adx_min_values = [15.0, 20.0]
subset_min_size = 1
subset_max_size = 1
top_n = 10
min_trades = 8
walk_forward_train_months = 6
walk_forward_test_months = 1
walk_forward_step_months = 1
monte_carlo_iterations = 1000
monte_carlo_horizon_months = 12
target_monthly_return_pct = 5.0
random_seed = 42
